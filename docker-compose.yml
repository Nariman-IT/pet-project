services:

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: dev
    container_name: php
    volumes:
      - ./app:/var/www/app

    depends_on:
      database:
        condition: service_healthy
      redis: 
        condition: service_healthy
  
    ports:
      - "${APP_PORT}:9000"
    networks:
      - laravel_network



  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s
    
    ports:
      - "${REDIS_PORT}:6379" 

    volumes:
      - redis_laravel_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - laravel_network




  nginx:
    image: nginx:stable-alpine3.21
    container_name: nginx
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"

    volumes:
      - ./docker/nginx/:/etc/nginx/conf.d
  
    depends_on:
      - php
    networks:
      - laravel_network



  database:
    image: postgres:15-alpine
    container_name: postgres

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 10s

    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - postgres_laravel_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks:
      - laravel_network


volumes:
  postgres_laravel_data:
  redis_laravel_data:

networks:
  laravel_network:
    driver: bridge