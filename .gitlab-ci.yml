stages:
  - build
  - code-quality

build:php-image:
  stage: build
  image: docker:25
  services:
    - name: docker:25-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker build -f .docker/php/Dockerfile --target dev -t "$CI_REGISTRY_IMAGE/php-dev:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE/php-dev:$CI_COMMIT_SHA"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

.code_quality_template: &code_quality_template
  stage: code-quality
  image: "$CI_REGISTRY_IMAGE/php-dev:$CI_COMMIT_SHA"
  needs: ["build:php-image"]
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - app/vendor/

  before_script:
    - cd app
    - export APP_KEY="base64:$(php -r 'echo base64_encode(random_bytes(32));')"
    - export JWT_SECRET="$(php -r 'echo bin2hex(random_bytes(32));')"
    - export APP_ENV=testing
    - export CACHE_DRIVER=array
    - export SESSION_DRIVER=array
    - export QUEUE_CONNECTION=sync
    - composer install --no-interaction --prefer-dist --no-progress

cs-fixer:
  <<: *code_quality_template
  script:
    - composer cs:check

phpstan:
  <<: *code_quality_template
  script:
    - composer stan

rector:
  <<: *code_quality_template
  script:
    - composer rector:check

tests:
  <<: *code_quality_template
  script:
    - composer test